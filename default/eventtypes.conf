#   TA-oura eventtypes.conf — tag Oura events into the Wearables data model.
#   The data model (in the wearables app) constrains its datasets on these
#   vendor-neutral tags, so any vendor's TA can contribute the same way.

[oura_sleep_session]
search = sourcetype=oura:sleep_detail

[oura_sleep_summary]
search = sourcetype=oura:sleep

[oura_activity]
search = sourcetype=oura:activity

[oura_workout]
search = sourcetype=oura:workouts

[oura_heart_rate]
search = sourcetype=oura:heart_rate

[oura_readiness]
search = sourcetype=oura:readiness

[oura_spo2]
search = sourcetype=oura:spo2

[oura_cardio_age]
search = sourcetype=oura:cardio_age

[oura_resilience]
search = sourcetype=oura:resilience

[oura_sleep_time]
search = sourcetype=oura:sleep_time

[oura_battery]
search = sourcetype=oura:battery

[oura_ring_config]
search = sourcetype=oura:ring_config

[oura_personal_info]
search = sourcetype=oura:personal_info
