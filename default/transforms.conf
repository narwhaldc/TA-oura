#   TA-oura transforms.conf — lookup definitions.
#
#   Both lookups are WRITE-LOCKED to admin/sc_admin via metadata/default.meta.
#   They are ENRICHMENT/identity only — NOT the access-control mechanism.
#   Read isolation is enforced by authorize.conf srchFilter on the indexed
#   person_id, independent of these lookups.

# Identity/account map — one row per vendor account; MULTIPLE rows per person
# (e.g. Oura ring + Garmin watch = 2 rows, same person_id). Consumed by the
# ingesters to resolve (vendor, vendor_user_id) -> person_id.
[wearable_identity_map]
filename = wearable_identity_map.csv
case_sensitive_match = true

# Person profile — one row per person; enrichment (name + goals). Replaces the
# old hardcoded 10K step goal.
[wearable_person_profile]
filename = wearable_person_profile.csv
case_sensitive_match = true
