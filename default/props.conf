#   TA-oura props.conf — canonical field normalization for Oura sourcetypes.
#
#   Boundary (see wearables-roadmap): IDENTITY (vendor, person_id) is stamped
#   at INGEST as HEC indexed fields — NOT here. This file does the search-time
#   BULK: JSON extraction, field-name mapping, unit conversion (Oura seconds ->
#   canonical minutes), derived fields, and person enrichment. Raw JSON is kept
#   intact in _raw; every field below is additive.
#
#   Sourcetype scheme (set by the fetcher): oura:<oura_data_type>
#     oura:sleep_detail  = the sleep SESSION (durations, phases, HR/HRV, type)
#     oura:sleep         = the daily_sleep SUMMARY (score + contributors)
#     (oura:heart_rate, oura:activity, oura:readiness, ... = later increments)

# ---------------------------------------------------------------------------
# Sleep SESSION  ->  Wearables > Sleep
# ---------------------------------------------------------------------------
[oura:sleep_detail]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0

# durations: Oura seconds -> canonical minutes
EVAL-total_sleep_min = round(total_sleep_duration/60, 1)
EVAL-time_in_bed_min = round(time_in_bed/60, 1)
EVAL-awake_min       = round(awake_time/60, 1)
EVAL-deep_min        = round(deep_sleep_duration/60, 1)
EVAL-light_min       = round(light_sleep_duration/60, 1)
EVAL-rem_min         = round(rem_sleep_duration/60, 1)
EVAL-latency_min     = round(latency/60, 0)

# straight renames (same units)
FIELDALIAS-oura_hr = average_heart_rate AS avg_hr lowest_heart_rate AS lowest_hr average_hrv AS hrv_avg average_breath AS respiration_avg
EVAL-efficiency_pct = efficiency
EVAL-spo2_avg       = spo2_percentage_average

# canonical sleep type: Oura long_sleep -> long_sleep, else nap
EVAL-sleep_type = if(type=="long_sleep", "long_sleep", "nap")

# vendor fallback for search-time (RBAC still uses the INDEXED vendor/person_id)
EVAL-vendor = "oura"

# dataset tag (data model constrains on tag=wearable_sleep)
EVAL-wearable_dataset = "sleep"

# enrichment: indexed person_id -> readable name + goals
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal distance_goal_m calorie_goal

# ---------------------------------------------------------------------------
# Daily SLEEP SUMMARY (score + contributors)  ->  Wearables > Sleep
#   Oura splits the nightly SCORE from the SESSION; the Sleep dataset unions
#   both, correlated by person_id + day.
# ---------------------------------------------------------------------------
[oura:sleep]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0

EVAL-sleep_score = score
EVAL-vendor      = "oura"
EVAL-wearable_dataset = "sleep_summary"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal distance_goal_m calorie_goal

# ---------------------------------------------------------------------------
# Activity (daily)  ->  Wearables > Activity  (tag=wearable_activity)
# Oura times are SECONDS -> minutes; equivalent_walking_distance = meters
# (energy-as-distance "Walk Equivalent", not literal steps*stride).
# Device goals come from Oura (target_*) so the profile lookup only supplies
# step_goal + person_name (don't let it clobber the device-provided goals).
# ---------------------------------------------------------------------------
[oura:activity]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-steps           = steps
EVAL-distance_m      = equivalent_walking_distance
EVAL-active_calories = active_calories
EVAL-total_calories  = total_calories
EVAL-activity_score  = score
EVAL-active_min      = round((high_activity_time + medium_activity_time + low_activity_time)/60, 0)
EVAL-calorie_goal    = target_calories
EVAL-distance_goal_m = target_meters
# activity-intensity breakdown: Oura seconds -> canonical minutes
EVAL-active_high_min   = round(high_activity_time/60, 0)
EVAL-active_medium_min = round(medium_activity_time/60, 0)
EVAL-active_low_min    = round(low_activity_time/60, 0)
EVAL-sedentary_min     = round(sedentary_time/60, 0)
EVAL-resting_min       = round(resting_time/60, 0)
EVAL-inactivity_alerts = inactivity_alerts
# daily activity-score contributors (vendor-proprietary sub-scores; null for
# vendors that don't provide them — the dashboard panel just stays empty)
EVAL-contrib_meet_daily_targets = 'contributors.meet_daily_targets'
EVAL-contrib_move_every_hour    = 'contributors.move_every_hour'
EVAL-contrib_recovery_time      = 'contributors.recovery_time'
EVAL-contrib_stay_active        = 'contributors.stay_active'
EVAL-contrib_training_frequency = 'contributors.training_frequency'
EVAL-contrib_training_volume    = 'contributors.training_volume'
EVAL-vendor          = "oura"
EVAL-wearable_dataset = "activity"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Workouts (discrete exercise sessions)  ->  Wearables > Workout
#   (tag=wearable_workout). start/end normalized to canonical EPOCH so any
#   vendor's TA can map its own timestamp format to the same fields. distance
#   is meters, calories kcal, intensity a vendor label (easy/moderate/hard).
# ---------------------------------------------------------------------------
[oura:workouts]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-workout_activity    = activity
EVAL-workout_start_epoch = strptime(start_datetime, "%Y-%m-%dT%H:%M:%S.%3N%z")
EVAL-workout_end_epoch   = strptime(end_datetime, "%Y-%m-%dT%H:%M:%S.%3N%z")
EVAL-workout_calories    = calories
EVAL-workout_distance_m  = distance
EVAL-workout_intensity   = intensity
EVAL-workout_id          = id
EVAL-vendor              = "oura"
EVAL-wearable_dataset    = "workout"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Heart rate (intraday)  ->  Wearables > HeartRate  (tag=wearable_heartrate)
# `bpm` is already the canonical field. Artifact filtering (bpm<=200) stays a
# search-time concern in the dashboards, not here (props can't drop events).
# ---------------------------------------------------------------------------
[oura:heart_rate]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-vendor           = "oura"
EVAL-wearable_dataset = "heartrate"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Readiness (daily, Oura-proprietary)  ->  tag=wearable_daily
# ---------------------------------------------------------------------------
[oura:readiness]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-readiness_score = score
EVAL-temp_deviation  = temperature_deviation
EVAL-temp_trend_deviation = temperature_trend_deviation
EVAL-hrv_balance     = 'contributors.hrv_balance'
# readiness score contributors (vendor-proprietary sub-scores)
EVAL-readiness_contrib_body_temp      = 'contributors.body_temperature'
EVAL-readiness_contrib_resting_hr     = 'contributors.resting_heart_rate'
EVAL-readiness_contrib_recovery_index = 'contributors.recovery_index'
EVAL-vendor          = "oura"
EVAL-wearable_dataset = "readiness"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# SpO2 (daily)  ->  tag=wearable_daily   (spo2 is nested: spo2_percentage.average)
# ---------------------------------------------------------------------------
[oura:spo2]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-spo2_avg              = 'spo2_percentage.average'
EVAL-breathing_disturbance = breathing_disturbance_index
EVAL-vendor               = "oura"
EVAL-wearable_dataset     = "spo2"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Cardiovascular Age (daily, Oura-proprietary)  ->  tag=wearable_daily
# ---------------------------------------------------------------------------
[oura:cardio_age]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-cardio_age = vascular_age
EVAL-pwv        = pulse_wave_velocity
EVAL-vendor     = "oura"
EVAL-wearable_dataset = "cardio_age"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Resilience (daily, Oura-proprietary)  ->  tag=wearable_daily
# ---------------------------------------------------------------------------
[oura:resilience]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-resilience_level = level
# resilience score contributors (vendor-proprietary sub-scores)
EVAL-resilience_contrib_sleep_recovery   = 'contributors.sleep_recovery'
EVAL-resilience_contrib_daytime_recovery = 'contributors.daytime_recovery'
EVAL-resilience_contrib_stress           = 'contributors.stress'
EVAL-vendor           = "oura"
EVAL-wearable_dataset = "resilience"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Sleep-time recommendation (Oura bedtime guidance)  ->  tag=wearable_daily
# ---------------------------------------------------------------------------
[oura:sleep_time]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-sleep_time_recommendation = recommendation
EVAL-sleep_time_status         = status
EVAL-vendor                    = "oura"
EVAL-wearable_dataset          = "sleep_time"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# ---------------------------------------------------------------------------
# Personal info (person metadata: age, biological sex)  ->  tag=wearable_daily
# Daily snapshot; supplies `age` for Tanaka max-HR / Karvonen HRR math.
# ---------------------------------------------------------------------------
[oura:personal_info]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-age            = age
EVAL-biological_sex = biological_sex
EVAL-vendor         = "oura"
EVAL-wearable_dataset = "person_info"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal
