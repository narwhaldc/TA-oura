#   TA-oura — Oura technology add-on for the Wearables platform
#   Ingest-side field normalization: maps raw Oura Ring events into the
#   canonical "Wearables" data model (Sleep / HeartRate / Activity).
#   Data is delivered to HEC by oura_to_hec_with_phi.py (index=wearables),
#   with indexed fields vendor + person_id set at ingest.

